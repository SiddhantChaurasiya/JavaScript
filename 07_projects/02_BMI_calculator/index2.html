<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style2.css" />
    <title>BMI Calculator</title>
  </head>
  <body>
    <div class="container">
      <h1>BMI Calculator</h1>
      <form>
        <p class="center">
          <label>Height in CM: </label><input type="text" id="height" />
        </p>
        <p class="center">
          <label>Weight in KG: </label><input type="text" id="weight" />
        </p>
        <button class="center">Calculate</button>

        <div id="results" class="center"></div>
        <div id="condition" class="center"></div>
        <div id="weight-guide" class="center">
          <h3 class="center">BMI Weight Guide</h3>
          <p class="center">Under Weight = Less than 18.6</p>
          <p class="center">Normal Range = 18.6 and 24.9</p>
          <p class="center">Overweight = Greater than 24.9</p>
        </div>
      </form>
    </div>
  </body>
  <script src="chaiaurcode2.js"></script>
</html>
